<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SILA - Sistem Informasi Layanan Akademik</title>
</head>
<body>
    <header class = "navbar">
        <div class = "container navbar-inner">
        <input type = "checkbox" id = "navToogle" class = "nav-toogle">
            <a href = "index.html" class ="logo">🎓 SILA</a> 
            <label for = "navToogle" class = "hamburger">
                <span></span>
                <span></span>
                <span></span>
            </label>
            
            <!-- <p>Sistem Informasi Layanan Akademik</p> -->
            <nav>
                <ul class="nav-menu">
                <!-- Link -->
                    <li><a href="index.html">Beranda</a></li>
                    <li><a href="layanan.html"  class = "active">Ajukan Layanan</a></li>
                    <li><a href="riwayat.html">Riwayat</a></li>
                </ul>
            </nav> 
        </div>
    </header>
    <main>
        <section class = "section">
            <div class="container">
                <h1>Ajukan Layanan Akademik</h1>
                <form action = "#" method="post" class = "form-card" onsubmit="return validasiForm()">
                    <fieldset>
                        <legend>Data Pengajuan</legend>
                            <div class = "form-group">
                                <label for = "nama">Nama Lengkap</label>
                                <input type = "text" id = "nama" name = "nama" placeholder="Masukkan nama lengkap">
                            </div>
                        <div class ="form-row">                            
                            <div class = "form-group">
                                <label for = "nim">NIM</label>
                                <input type = "text" id = "nim" name = "nim" placeholder="contoh : 12345678" maxlength="8">

                            </div>
                            <div class = "form-group">
                                <label for = "prodi">Program Studi</label>
                                <select id = "prodi" name = "prodi">
                                    <option value = "">-Pilih Program Studi-</option>
                                    <option value = "Sistem Informasi">Sistem Informasi</option>
                                    <option value = "Teknik Informatika">Teknik Informatika</option>
                                    <option value = "Manajemen">Manajemen</option>
                                    <option value = "Akuntansi">Akuntansi</option>
                                </select>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="layanan">Jenis Layanan</label>
                                    <select id="layanan" name="layanan">
                                        <option value="">— Pilih Layanan —</option>
                                        <option value="SKA">SKA — Surat Aktif Kuliah</option>
                                        <option value="CAK">CAK — Cuti Akademik</option>
                                        <option value="TNM">TNM — Transkrip Nilai</option>
                                        <option value="PDA">PDA — Perubahan Data</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="tanggal">Tanggal Pengajuan</label>
                                <input type="date" id="tanggal" name="tanggal">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="Keterangan">Keterangan (Opsional)</label>
                            <textarea id = "keterangan" name = "keterangan" rows ="3" placeholder="Jelaskan alasan pengajuan Anda..."></textarea>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">🚀 Ajukan Sekarang</button>
                            <button type="reset" class="btn btn-outline">↺ Reset</button>
                        </div>
                    </fieldset>
                </form>

            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class ="footer">
        <div class = "container footer-inner">
            <div>
                <strong>SILA</strong>
                <p>Platform digital untuk pengajuan layanan akademik mahasiswa.</p>
            </div>
            <div>
                <h4>Navigasi</h4>
                <a href="index.html">beranda | </a>
                <a href="layanan.html">Ajukan layanan | </a>
                <a href="riwayat.html">Riwayat</a>
            </div>
        </div>
        <div class = "footer-bottom">
            <div class = "container">
                <p>&copy; 2026 SILA - Dibuat untuk tugas pemrograman web</p>
            </div>
        </div>
    </footer>
    <script src="js/script.js"></script>
</body>
</html>
